version: '3.8'
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - INFERENCE_URL=http://ml:8000
      - DATABASE_URL=${DATABASE_URL}
      - NEXT_PUBLIC_API_BASE=/api
      - INFERENCE_SERVICE_TOKEN=${INFERENCE_SERVICE_TOKEN}
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
    depends_on:
      - ml
      - db
    volumes:
      - ./models:/app/models

  ml:
    build:
      context: .
      dockerfile: Dockerfile.ml
    ports:
      - '8000:8000'
    volumes:
      - ./ml/models:/app/ml/models
      - ./models:/app/models
    environment:
      - MODEL_DIR=/app/ml/models
      - API_TOKENS=${INFERENCE_SERVICE_TOKEN}
      - INFERENCE_JWT_SECRET=${INFERENCE_JWT_SECRET}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=ProfitForce
      - POSTGRES_USER=bf
      - POSTGRES_PASSWORD=bfpass
    ports:
      - '5432:5432'
    volumes:
      - db-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

volumes:
  db-data:
