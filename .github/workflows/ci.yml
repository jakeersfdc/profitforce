name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  # ────────────────────────────────────────────────────────────
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - name: Lint (non-blocking)
        continue-on-error: true
        run: npm run lint

  # ────────────────────────────────────────────────────────────
  test-python:
    name: Python ML Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r ml/requirements.txt -r ml/requirements-dev.txt
      - run: pip install uvicorn[standard]
      - run: pytest tests/test_ml_pipeline.py -v --tb=short

  # ────────────────────────────────────────────────────────────
  build-web:
    name: Build Next.js
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}

  # ────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build-web, test-python]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build web image
        run: docker build -f Dockerfile.web -t ProfitForce-web:${{ github.sha }} .

      - name: Build ML image
        run: docker build -f Dockerfile.ml -t ProfitForce-ml:${{ github.sha }} .

  # ────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCLOUD_SERVICE_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCLOUD_PROJECT }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker

      - name: Build and Push Web
        run: |
          docker build -f Dockerfile.web -t gcr.io/${{ secrets.GCLOUD_PROJECT }}/ProfitForce-web:${{ github.sha }} .
          docker push gcr.io/${{ secrets.GCLOUD_PROJECT }}/ProfitForce-web:${{ github.sha }}

      - name: Build and Push ML
        run: |
          docker build -f Dockerfile.ml -t gcr.io/${{ secrets.GCLOUD_PROJECT }}/ProfitForce-ml:${{ github.sha }} .
          docker push gcr.io/${{ secrets.GCLOUD_PROJECT }}/ProfitForce-ml:${{ github.sha }}

      - name: Deploy to GKE
        run: |
          gcloud container clusters get-credentials ProfitForce-cluster --zone us-central1-a
          kubectl set image deployment/ProfitForce-web web=gcr.io/${{ secrets.GCLOUD_PROJECT }}/ProfitForce-web:${{ github.sha }}
          kubectl set image deployment/ProfitForce-ml ml=gcr.io/${{ secrets.GCLOUD_PROJECT }}/ProfitForce-ml:${{ github.sha }}
          kubectl rollout status deployment/ProfitForce-web --timeout=120s
          kubectl rollout status deployment/ProfitForce-ml --timeout=120s

  # ────────────────────────────────────────────────────────────
  train-models:
    name: Retrain Models (Weekly)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -r ml/requirements.txt
      - run: node scripts/train_all.js
      - name: Evaluate and promote best models
        run: python ml/evaluate_models.py --top 5
      - name: Commit updated models
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add models/ ml/models/
          git diff --staged --quiet || git commit -m "chore: retrain models [skip ci]"
          git push
