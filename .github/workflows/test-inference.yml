name: test-inference

on:
  push:
    paths:
      - 'ml/api/**'
      - 'tests/**'
  pull_request:
    paths:
      - 'ml/api/**'
      - 'tests/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Create venv
        run: python -m venv .venv && source .venv/bin/activate
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ml/api/requirements.txt
          if [ -f ml/requirements-dev.txt ]; then pip install -r ml/requirements-dev.txt; fi
          pip install pytest
      - name: Create example model
        run: python ml/api/create_example_model.py
      - name: Run tests
        run: pytest -q
