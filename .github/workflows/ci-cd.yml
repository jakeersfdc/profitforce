name: CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  node-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: npm ci
      - name: Lint (non-blocking)
        continue-on-error: true
        run: npm run lint --if-present
      - name: Build
        run: npm run build

  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r ml/requirements.txt
      - name: Run inference tests (if any)
        run: |
          if [ -f ml/tests/test_predict_routing.py ]; then pytest -q; else echo 'no tests'; fi

  build-and-push-images:
    runs-on: ubuntu-latest
    needs: [node-tests, python-tests]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push web image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: ghcr.io/${{ github.repository }}:web-${{ github.sha }}
      - name: Build and push ml image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile.ml
          push: true
          tags: ghcr.io/${{ github.repository }}:ml-${{ github.sha }}
