name: Deploy to Cloud Run

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ secrets.GCLOUD_PROJECT }}
          service_account_key: ${{ secrets.GCLOUD_SA_KEY }}

      - name: Configure Docker for GCR
        run: |
          gcloud auth configure-docker --quiet

      - name: Build and push image
        run: |
          IMAGE=gcr.io/${{ secrets.GCLOUD_PROJECT }}/ProfitForce-web:${{ github.sha }}
          gcloud builds submit --tag "$IMAGE" .

      - name: Deploy to Cloud Run
        run: |
          IMAGE=gcr.io/${{ secrets.GCLOUD_PROJECT }}/ProfitForce-web:${{ github.sha }}
          gcloud run deploy ProfitForce-web \
            --image "$IMAGE" \
            --region ${CLOUD_RUN_REGION:-us-central1} \
            --platform managed \
            --allow-unauthenticated \
            --update-env-vars "NODE_ENV=production"

      - name: Build and push ML image
        run: |
          IMAGE_ML=gcr.io/${{ secrets.GCLOUD_PROJECT }}/ProfitForce-ml:${{ github.sha }}
          gcloud builds submit --tag "$IMAGE_ML" -f Dockerfile.ml .

      - name: Deploy ML to Cloud Run
        run: |
          IMAGE_ML=gcr.io/${{ secrets.GCLOUD_PROJECT }}/ProfitForce-ml:${{ github.sha }}
          gcloud run deploy ProfitForce-ml \
            --image "$IMAGE_ML" \
            --region ${CLOUD_RUN_REGION:-us-central1} \
            --platform managed \
            --allow-unauthenticated \
            --update-env-vars "NODE_ENV=production"

      - name: Run migrations on deployed DB
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "Running migrations against DATABASE_URL"
          # If you prefer, run migrations from a migration runner script in the repo
          node scripts/run_migrations.js
