apiVersion: apps/v1
kind: Deployment
metadata:
  name: bullforce-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bullforce-web
  template:
    metadata:
      labels:
        app: bullforce-web
    spec:
      containers:
        - name: web
          image: REPLACE_WITH_REGISTRY/bullforce:web-latest
          ports:
            - containerPort: 3000
          env:
            - name: INFERENCE_URL
              value: http://bullforce-ml:8000
